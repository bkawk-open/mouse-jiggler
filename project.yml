name: MouseJiggler
options:
  bundleIdPrefix: com.bkawk
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  MouseJiggler:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Mouse Jiggler
        CFBundleName: MouseJiggler
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "Copyright © 2026 bkawk. All rights reserved."
    entitlements:
      path: Resources/MouseJiggler.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bkawk.MouseJiggler
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
